name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJUCE_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build macOS targets
        run: cmake --build build --config Release --target HeadturnerHat_AU HeadturnerHat_VST3 HeadturnerHat_Standalone

      - name: Package macOS installer
        run: |
          chmod +x scripts/package-macos.sh
          scripts/package-macos.sh build out/macos "${GITHUB_REF_NAME#v}"

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: out/macos/HeadturnerHat-macOS-installer.pkg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJUCE_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build Windows VST3
        run: cmake --build build --config Release --target HeadturnerHat_VST3

      - name: Package Windows installer
        shell: pwsh
        run: ./scripts/package-windows.ps1 build out/windows

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/windows/HeadturnerHat-Windows-Installer.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release

      - name: Zip release bundle
        run: |
          cd release
          zip -r HeadturnerHat-${GITHUB_REF_NAME}.zip .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/HeadturnerHat-macOS-installer.pkg
            release/HeadturnerHat-Windows-Installer.exe
            release/HeadturnerHat-${{ github.ref_name }}.zip
